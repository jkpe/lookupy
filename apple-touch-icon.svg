<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <radialGradient id="bg" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#171920"/>
      <stop offset="100%" stop-color="#0a0b0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f6821f" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f6821f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6821f"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
    <filter id="blur-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" fill="url(#bg)"/>

  <!-- Ambient glow behind the glass -->
  <circle cx="78" cy="75" r="62" fill="url(#glow)"/>

  <!-- Magnifying glass ring with glow filter -->
  <circle cx="78" cy="75" r="42" fill="none" stroke="url(#orange)" stroke-width="13" filter="url(#blur-glow)"/>

  <!-- Handle with glow -->
  <line x1="108" y1="105" x2="154" y2="151" stroke="url(#orange)" stroke-width="13" stroke-linecap="round" filter="url(#blur-glow)"/>

  <!-- DNS record lines inside the lens -->
  <line x1="56" y1="64" x2="98" y2="64" stroke="#f6821f" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="56" y1="75" x2="100" y2="75" stroke="#f6821f" stroke-width="3.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="56" y1="86" x2="88" y2="86" stroke="#f6821f" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>
</svg>
